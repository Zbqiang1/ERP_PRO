# ==================== 服务配置 ====================
server:
  port: 8080

spring:
  application:
    name: ERP-SYS

  # ==================== 环境配置 ====================
  profiles:
    active: dev

  # ==================== 日期格式化 ====================
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai
    default-property-inclusion: non_null

  # ==================== 文件上传 ====================
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 200MB

# ==================== MyBatis-Plus 配置 ====================
mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  type-aliases-package: com.erp.modules.*.entity
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0
  configuration:
    map-underscore-to-camel-case: true
    cache-enabled: false
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

# ==================== Knife4j API 文档配置 ====================
knife4j:
  enable: true
  setting:
    language: zh-CN

# ==================== JWT 配置 ====================
jwt:
  secret: ERP-SYS-JWT-SECRET-KEY-2026-MUST-BE-AT-LEAST-256-BITS-LONG
  expiration: 7200
  header: Authorization
  token-prefix: "Bearer "

# ==================== XXL-Job 配置 ====================
xxl:
  job:
    admin:
      addresses: http://localhost:8088/xxl-job-admin
    accessToken: default_token
    executor:
      appname: erp-sys-executor
      address: ""
      ip: ""
      port: 9999
      logpath: ./logs/xxl-job
      logretentiondays: 30
